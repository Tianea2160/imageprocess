spring:
  threads:
    virtual:
      enabled: true
  application:
    name: imageprocess-worker
  datasource:
    url: jdbc:postgresql://localhost:25432/imageprocess
    username: imageprocess
    password: imageprocess
    hikari:
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 36379
      timeout: 10s
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: imageprocess
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.imageprocess.adapter.kafka
      auto-offset-reset: earliest
    listener:
      concurrency: 3
  lifecycle:
    timeout-per-shutdown-phase: 30s
  task:
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 30s

server:
  port: 8081

mock-worker:
  base-url: https://dev.realteeth.ai/mock
  api-key: ${MOCK_WORKER_API_KEY:mock_1293d47ba4b74d95b3ae0e514d043e5f}
  connect-timeout: 5s
  read-timeout: 10s

polling:
  fixed-delay: 2000
  budget-per-tick: 50
  base-delay-ms: 2000
  max-delay-ms: 60000
  max-retry-count: 3
  initial-delay-ms: 5000
  spread-window-ms: 10000

rate-limiter:
  max-tokens: 10
  refill-rate: 10
  refill-interval-ms: 1000

circuit-breaker:
  failure-threshold: 5
  cooldown-seconds: 30
  half-open-max-calls: 3
  failure-window-seconds: 60
