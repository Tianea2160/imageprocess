services:
  db:
    image: postgres:17-alpine
    ports:
      - "25432:5432"
    environment:
      POSTGRES_DB: imageprocess
      POSTGRES_USER: imageprocess
      POSTGRES_PASSWORD: imageprocess
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imageprocess"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "36379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
