spring:
  application:
    name: imageprocess
  datasource:
    url: jdbc:postgresql://localhost:25432/imageprocess
    username: imageprocess
    password: imageprocess
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 36379

mock-worker:
  base-url: https://dev.realteeth.ai/mock
  api-key: ${MOCK_WORKER_API_KEY:}
  connect-timeout: 5s
  read-timeout: 30s

polling:
  fixed-delay: 2000
  budget-per-tick: 50
  base-delay-ms: 2000
  max-delay-ms: 60000
  max-retry-count: 3
  initial-delay-ms: 5000
  spread-window-ms: 10000

rate-limiter:
  max-tokens: 50
  refill-rate: 10
  refill-interval-ms: 1000

circuit-breaker:
  failure-threshold: 5
  cooldown-seconds: 30
  half-open-max-calls: 3
